name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and verification tools
        run: python -m pip install --upgrade pip build pytest ruff '.[tui]'
      - name: Compile Python sources
        run: python -m compileall -q src tests spikes scripts
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: Check pull-request whitespace
        if: ${{ matrix.python-version == '3.12' && github.event_name == 'pull_request' }}
        run: git diff --check ${{ github.event.pull_request.base.sha }}...HEAD
      - name: Check pushed-commit whitespace
        if: ${{ matrix.python-version == '3.12' && github.event_name == 'push' }}
        run: git diff-tree --check --no-commit-id -r HEAD

  distributions:
    name: Reproducible distributions and installed CLI
    needs: quality
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: "1784073600"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install PEP 517 frontend
        run: python -m pip install --upgrade pip build
      - name: Build first isolated artifact set
        run: python -m build --outdir /tmp/switchboard-build-a
      - name: Build second isolated artifact set
        run: python -m build --outdir /tmp/switchboard-build-b
      - name: Compare and audit artifact contents
        run: >-
          python scripts/verify_distributions.py
          /tmp/switchboard-build-a /tmp/switchboard-build-b
      - name: Install wheel in a fresh environment
        run: |
          python -m venv /tmp/switchboard-wheel-smoke
          /tmp/switchboard-wheel-smoke/bin/python -m pip install \
            --no-deps /tmp/switchboard-build-a/*.whl
          /tmp/switchboard-wheel-smoke/bin/python -m pip check
      - name: Install source distribution in a fresh environment
        run: |
          python -m venv /tmp/switchboard-sdist-smoke
          /tmp/switchboard-sdist-smoke/bin/python -m pip install \
            --no-deps /tmp/switchboard-build-a/*.tar.gz
          /tmp/switchboard-sdist-smoke/bin/python -m pip check
      - name: Smoke installed packages and migrations
        working-directory: /tmp
        run: |
          for python in \
            /tmp/switchboard-wheel-smoke/bin/python \
            /tmp/switchboard-sdist-smoke/bin/python
          do
          "$python" -I - <<'PY'
          from importlib.metadata import version
          from importlib.resources import files
          from pathlib import Path
          from tempfile import TemporaryDirectory

          import agent_switchboard
          import agent_switchboard.cli
          import agent_switchboard.config
          import agent_switchboard.curation
          import agent_switchboard.doctor
          import agent_switchboard.domain
          import agent_switchboard.executable
          import agent_switchboard.hook_config
          import agent_switchboard.hooks
          import agent_switchboard.local
          import agent_switchboard.local_events
          import agent_switchboard.live
          import agent_switchboard.paths
          import agent_switchboard.protocol
          import agent_switchboard.providers.codex
          import agent_switchboard.providers.claude
          import agent_switchboard.reconcile
          import agent_switchboard.snapshot
          import agent_switchboard.state
          import agent_switchboard.tui_gateway
          import agent_switchboard.tui_model
          from agent_switchboard.migrations import CURRENT_SCHEMA_VERSION
          from agent_switchboard.storage import Registry

          assert version("agent-switchboard") == agent_switchboard.__version__
          package = files("agent_switchboard")
          for migration in (
              "migrations/__init__.py",
              "migrations/v0001_initial.py",
              "migrations/v0002_remote_cache.py",
              "migrations/v0003_name_provenance_runtime_index.py",
              "migrations/v0004_runtime_truth_ordering.py",
              "migrations/v0005_history_launch.py",
          ):
              assert package.joinpath(migration).is_file()
          with TemporaryDirectory() as directory:
              with Registry(Path(directory) / "switchboard.db") as registry:
                  assert int(registry.metadata()["schema_version"]) == CURRENT_SCHEMA_VERSION
          PY
          done
      - name: Smoke installed swbctl entry points
        working-directory: /tmp
        run: |
          for environment in \
            /tmp/switchboard-wheel-smoke \
            /tmp/switchboard-sdist-smoke
          do
            python="$environment/bin/python"
            swbctl="$environment/bin/swbctl"
            test "$("$swbctl" --version)" = "swbctl 0.1.0"
            "$swbctl" --help | \
              grep -F "Inspect and route provider-native coding-agent sessions."
            "$swbctl" snapshot --help | grep -F -- "--reconcile {none,live,full}"
            "$swbctl" list --help | grep -F -- "--refresh"
            "$swbctl" show --help | grep -F -- "--handoff-limit"
            "$swbctl" current --help | grep -F -- "--handoff-limit"
            "$swbctl" session --help | grep -F "usage: swbctl session"
            "$swbctl" prepare-new --help | grep -F -- "--from SOURCE_REF"
            "$swbctl" hooks install --help | grep -F -- "--dry-run"
            "$swbctl" hooks uninstall --help | grep -F -- "--dry-run"
            "$swbctl" doctor --help | grep -F "usage: swbctl doctor"
            "$swbctl" tui --help | grep -F "usage: swbctl tui"

            smoke_root="/tmp/$(basename "$environment")-xdg"
            rm -rf "$smoke_root"
            mkdir -p "$smoke_root/config" "$smoke_root/state" "$smoke_root/home"
            export XDG_CONFIG_HOME="$smoke_root/config"
            export XDG_STATE_HOME="$smoke_root/state"
            export HOME="$smoke_root/home"
            if "$swbctl" tui \
              > "$smoke_root/tui.stdout" 2> "$smoke_root/tui.stderr"
            then
              exit 1
            fi
            test ! -s "$smoke_root/tui.stdout"
            grep -F "pip install 'agent-switchboard[tui]'" \
              "$smoke_root/tui.stderr"
            "$swbctl" snapshot --json > "$smoke_root/snapshot.json"
            "$swbctl" list --json > "$smoke_root/list.json"
            "$python" -I - \
              "$smoke_root/snapshot.json" "$smoke_root/list.json" <<'PY'
          import sys
          from pathlib import Path

          from agent_switchboard.protocol import SnapshotEnvelope

          snapshot = SnapshotEnvelope.from_json(Path(sys.argv[1]).read_bytes())
          listed = SnapshotEnvelope.from_json(Path(sys.argv[2]).read_bytes())
          assert snapshot.host.host_id == listed.host.host_id
          assert snapshot.sessions == listed.sessions == ()
          PY
          done
      - uses: actions/upload-artifact@v7
        with:
          name: agent-switchboard-distributions
          path: /tmp/switchboard-build-a/*
          if-no-files-found: error
