name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime and verification tools
        run: python -m pip install --upgrade pip build pytest ruff .
      - name: Compile replacement generation
        run: python -m compileall -q src/agent_switchboard/_v3 tests
      - name: Check formatting
        run: ruff format --check .
      - name: Lint
        run: ruff check .
      - name: Test replacement generation
        run: pytest
      - name: Check pull-request whitespace
        if: ${{ matrix.python-version == '3.12' && github.event_name == 'pull_request' }}
        run: git diff --check ${{ github.event.pull_request.base.sha }}...HEAD
      - name: Check pushed-commit whitespace
        if: ${{ matrix.python-version == '3.12' && github.event_name == 'push' }}
        run: git diff-tree --check --no-commit-id -r HEAD

  distributions:
    needs: quality
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: "1784073600"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build reproducible artifact pairs
        run: |
          python -m pip install --upgrade pip build
          python -m build --outdir /tmp/switchboard-build-a
          python -m build --outdir /tmp/switchboard-build-b
      - name: Compare and audit clean-break contents
        run: >-
          python scripts/verify_distributions.py
          /tmp/switchboard-build-a /tmp/switchboard-build-b
      - name: Install artifact in a clean environment
        run: |
          python -m venv /tmp/switchboard-wheel-smoke
          /tmp/switchboard-wheel-smoke/bin/python -m pip install \
            /tmp/switchboard-build-a/*.whl
          /tmp/switchboard-wheel-smoke/bin/python -m pip check
      - name: Smoke public package and reject old modules
        working-directory: /tmp
        run: |
          python=/tmp/switchboard-wheel-smoke/bin/python
          swbctl=/tmp/switchboard-wheel-smoke/bin/swbctl
          test "$("$swbctl" --version)" = "swbctl 0.3.0"
          "$swbctl" --help | grep -F "persistent project and task views"
          "$swbctl" state navigator --help | grep -F -- "--refresh"
          "$swbctl" view open --help | grep -F -- "--can-focus-desktop"
          "$python" -I - <<'PY'
          from importlib import util
          from importlib.metadata import version
          from importlib.resources import files

          import agent_switchboard
          import agent_switchboard.agent_mcp
          import agent_switchboard.cli
          import agent_switchboard.config
          import agent_switchboard.cutover
          import agent_switchboard.navigator
          import agent_switchboard.provider_runtime
          import agent_switchboard.trusted_hook
          import agent_switchboard.workflow

          assert version("agent-switchboard") == agent_switchboard.__version__ == "0.3.0"
          assert files("agent_switchboard").joinpath(
              "migrations/v0001_baseline.py"
          ).is_file()
          for removed in ("snapshot", "task_actions", "tui_gateway", "providers"):
              assert util.find_spec(f"agent_switchboard.{removed}") is None
          PY
      - uses: actions/upload-artifact@v7
        with:
          name: agent-switchboard-distributions
          path: /tmp/switchboard-build-a/*
          if-no-files-found: error
